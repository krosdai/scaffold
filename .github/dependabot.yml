# Dependabot version updates for this polyglot scaffold.
# Ecosystems mirror the root manifests: pnpm (npm), uv (Python), Cargo (Rust),
# plus the GitHub Actions used in .github/workflows.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # JavaScript / TypeScript — pnpm workspace (package.json + pnpm-lock.yaml).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    assignees:
      - "xdanger"
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Python — uv project (pyproject.toml + uv.lock).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    assignees:
      - "xdanger"
    groups:
      uv-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Rust — Cargo workspace (Cargo.toml). Activates once member crates declare
  # dependencies; harmless while the workspace is empty.
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    assignees:
      - "xdanger"
    groups:
      cargo-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by the CI workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    assignees:
      - "xdanger"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
